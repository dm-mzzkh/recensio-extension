<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Recensio Library</title>
  <link rel="stylesheet" href="../lib/editor.css" />
  <style>
    /* Library page chrome: page header, search/filter toolbar, video list,
     * and the sticky #detail container that hosts renderEditor(). All
     * .detail-subtree rules (.chip, .chips, .sys-*, .clip*, .shot*, …) come
     * from ../lib/editor.css so the editor looks identical to the standalone
     * editor/index.html page. */
    * { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: #0f172a; color: #f8fafc; margin: 0 auto; padding: 24px; max-width: 1200px; font-size: 13px; }
    h1 { font-size: 20px; margin: 0; }
    .page-head { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
    .page-head h1 { flex: 1; }
    .page-head a.page-btn,
    .page-head button.page-btn {
      background: #1e293b; color: #e2e8f0;
      border: 1px solid #334155; border-radius: 4px;
      padding: 6px 12px; font-size: 13px;
      text-decoration: none; cursor: pointer; font-family: inherit;
    }
    .page-head a.page-btn:hover,
    .page-head button.page-btn:hover:not(:disabled) { background: #334155; border-color: #475569; }
    .page-head button.page-btn:disabled { opacity: 0.6; cursor: wait; }
    .backup-status { font-size: 12px; color: #94a3b8; margin: -8px 0 12px; min-height: 14px; font-variant-numeric: tabular-nums; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .toolbar { display: flex; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; align-items: center; }
    .toolbar input[type="text"], .toolbar input[type="number"] {
      background: #1e293b; color: #f8fafc; border: 1px solid #334155;
      border-radius: 4px; padding: 6px 10px; font-size: 13px; font-family: inherit;
    }
    .toolbar input:focus { outline: none; border-color: #6366f1; }
    .toolbar #query { flex: 1; min-width: 200px; }
    .toolbar label { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #94a3b8; }
    .toolbar input[type="number"] { width: 60px; }

    #tag-filters { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 16px; min-height: 4px; }
    /* Modifier only — base .chip / .chip-remove live in ../lib/editor.css. */
    .chip--filter { background: #4338ca; }

    .layout { display: grid; grid-template-columns: minmax(0, 1fr) minmax(0, 1fr); gap: 16px; align-items: start; }
    @media (max-width: 800px) { .layout { grid-template-columns: 1fr; } }

    #list { display: flex; flex-direction: column; gap: 8px; }
    .card { display: flex; gap: 12px; padding: 8px; background: #1e293b; border: 1px solid transparent; border-radius: 6px; cursor: pointer; }
    .card:hover { border-color: #475569; }
    .card--selected { border-color: #6366f1; background: #1e1b4b; }
    .thumb { width: 120px; height: 67px; object-fit: cover; border-radius: 4px; flex-shrink: 0; background: #0f172a; }
    .card-meta { min-width: 0; flex: 1; }
    .card-title { font-weight: 600; font-size: 13px; line-height: 1.3; margin-bottom: 2px; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
    .card-channel { font-size: 11px; color: #94a3b8; margin-bottom: 4px; }
    .card-tags { display: flex; flex-wrap: wrap; gap: 3px; margin-bottom: 4px; }
    .card-tags .tag { font-size: 10px; color: #cbd5e1; background: #334155; padding: 1px 4px; border-radius: 3px; }
    .card-rating { font-size: 11px; color: #fbbf24; font-weight: 600; }

    #detail { background: #1e293b; padding: 16px; border-radius: 6px; min-height: 400px; position: sticky; top: 24px; }
  </style>
</head>
<body>
  <div class="page-head">
    <h1>Recensio Library</h1>
    <button id="backup-btn" type="button" class="page-btn" title="Сохранить манифест + новые блобы в ~/Downloads/recensio-backup/">↓ Бэкап</button>
    <button id="import-btn" type="button" class="page-btn" title="Импорт из папки recensio-backup. ВНИМАНИЕ: затирает текущую базу.">↑ Импорт</button>
    <a class="page-btn" href="../graph/index.html">📊 Граф</a>
  </div>
  <p id="backup-status" class="backup-status"></p>
  <!-- webkitdirectory makes the picker accept a whole folder so the user
       picks ~/Downloads/recensio-backup/ once instead of selecting manifest
       + every blob by hand. -->
  <input id="import-input" type="file" webkitdirectory multiple style="display:none" />
  <div class="toolbar">
    <input id="query" type="text" placeholder="Search title or channel…" />
    <input id="tag-filter-input" type="text" list="all-tags-list" placeholder="Filter by tag (Enter)" autocomplete="off" />
    <label>Rating ≥ <input id="rating-min" type="number" min="1" max="10" value="1" /></label>
    <label>≤ <input id="rating-max" type="number" min="1" max="10" value="10" /></label>
  </div>
  <div id="tag-filters"></div>
  <div class="layout">
    <div>
      <div id="list"></div>
      <p id="empty" class="empty" style="display:none">No videos match.</p>
    </div>
    <div id="detail"><p class="empty">Select a video to edit</p></div>
  </div>
  <datalist id="all-tags-list"></datalist>
  <script src="main.js"></script>
</body>
</html>
