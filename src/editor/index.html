<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Recensio Editor</title>
  <link rel="stylesheet" href="../lib/editor.css" />
  <style>
    /* Page shell only — all .detail-subtree rules live in ../lib/editor.css.
     * The renderEditor() output mounts directly into <body>, so the body
     * itself acts as the .detail surrounding container; we mirror that
     * surface color and rely on the shared rules for the rest. */
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      font-family: system-ui, sans-serif;
      background: #1e293b; color: #f8fafc;
      margin: 0; padding: 16px;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div id="root" class="detail"><p class="status">Loading…</p></div>
  <script src="main.js"></script>
</body>
</html>
