<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Recensio</title>
  <style>
    body { width: 340px; margin: 0; padding: 12px; font-family: system-ui, sans-serif; background: #0f172a; color: #f8fafc; font-size: 13px; }
    h1 { font-size: 11px; margin: 0 0 8px; letter-spacing: 0.08em; text-transform: uppercase; color: #64748b; }
    #title { font-weight: 600; font-size: 14px; margin: 0 0 4px; line-height: 1.3; word-break: break-word; }
    #status { font-size: 12px; color: #94a3b8; margin: 0 0 12px; }
    #tags { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 6px; min-height: 4px; }
    .chip { display: inline-flex; align-items: center; gap: 2px; background: #334155; color: #e2e8f0; padding: 2px 4px 2px 6px; border-radius: 4px; font-size: 11px; }
    .chip-remove { background: transparent; color: #94a3b8; border: 0; cursor: pointer; padding: 0 2px; font-size: 14px; line-height: 1; }
    .chip-remove:hover { color: #f87171; }
    #tag-input { width: 100%; padding: 6px 8px; background: #1e293b; color: #f8fafc; border: 1px solid #334155; border-radius: 4px; font-size: 12px; box-sizing: border-box; margin-bottom: 8px; }
    #tag-input:focus { outline: none; border-color: #6366f1; }
    .actions { display: flex; gap: 6px; }
    button { flex: 1; padding: 7px; background: #6366f1; color: white; border: 0; border-radius: 4px; cursor: pointer; font-size: 12px; }
    button:hover:not(:disabled) { background: #4f46e5; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    button.secondary { background: #334155; }
    button.secondary:hover:not(:disabled) { background: #475569; }
  </style>
</head>
<body>
  <h1>Recensio</h1>
  <p id="title">…</p>
  <p id="status"></p>
  <div id="tags"></div>
  <input id="tag-input" type="text" list="tag-list" placeholder="Add tag (Enter or comma)" autocomplete="off" />
  <datalist id="tag-list"></datalist>
  <div class="actions">
    <button id="save">Save</button>
    <button id="library" class="secondary">Library</button>
  </div>
  <script src="main.js"></script>
</body>
</html>
